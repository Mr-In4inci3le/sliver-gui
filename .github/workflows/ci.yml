name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

permissions:
  contents: read

jobs:
  test:
    name: Vet, lint & test
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.6'
          cache: true

      # Wails links against GTK/WebKit; needed to compile package main.
      - name: Install WebKit build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev libwebkit2gtk-4.1-dev build-essential pkg-config

      - name: Download modules
        run: go mod download

      - name: go vet
        run: go vet -tags webkit2_41 ./...

      # golangci-lint v2 (config is v2 schema). Install a pinned version and run
      # it directly so the result is deterministic and independent of the
      # golangci-lint-action major version. Build tags come from .golangci.yml
      # (run.build-tags: webkit2_41).
      - name: golangci-lint
        run: |
          go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.12.2
          "$(go env GOPATH)/bin/golangci-lint" run ./...

      - name: go test
        run: go test -tags webkit2_41 -race -count=1 ./...
